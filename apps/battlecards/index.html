<!doctype html>
<!--
  The "dark" class on <html> enables Tailwind's dark mode utilities by default.
  Removing it switches the app to light mode. A toggle can add/remove it at runtime.
-->
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BattleCards</title>

    <!--
      Space Grotesk and Tanker are now bundled as @font-face in
      packages/ui/src/index.css — requesting them here too would just download
      the same faces twice.

      Noto Sans stays on Google Fonts: it's used only by the Blood Bowl and Star
      Player card templates, which need its 'CTGR'/'wdth' variation axes. Worth
      bundling as well if BattleCards ever ships a native build, since a card
      would otherwise render in a fallback face when offline.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
